<h2>URL Shortener</h2>

<form method="POST">

<input type="text" name="url" placeholder="Enter URL">

<button type="submit">Shorten</button>

</form>

<br>

<table border="1">

<tr>

<th>Original URL</th>

<th>Short URL</th>

</tr>

{% for url in urls %}

<tr>

<td>{{url.original_url}}</td>

<td>

<a href="/{{url.short_code}}">

{{url.short_code}}

</a>

</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/logout">Logout</a>
